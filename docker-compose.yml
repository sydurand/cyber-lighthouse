services:
  cyber-lighthouse:
    image: ghcr.io/sydurand/cyber-lighthouse:latest
    container_name: lighthouse
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "7883:8000"
    environment:
      - TZ=Europe/Paris
      - DATABASE_FILE=/app/data/articles.db
      - JSON_DATABASE_FILE=/app/data/base_veille.json
      - HF_HUB_DISABLE_IMPLICIT_TOKEN=1
      - USER=appuser
      - HOME=/app
    user: "1000:1000"
    volumes:
      - ./data:/app/data
      - ./cache:/app/cache
      - ./logs:/app/logs
      - ./reports:/app/reports
      - ./hf_cache:/app/.cache
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
