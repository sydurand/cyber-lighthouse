[pytest]
# Pytest configuration for Cyber-Lighthouse

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 6.0

# Directories to search for tests
testpaths = tests

# Logging
log_cli = false
log_cli_level = INFO

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    db: Database tests
    clustering: Clustering tests
    scraping: Web scraping tests
