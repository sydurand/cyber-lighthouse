<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyber-Lighthouse Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-slate-100 min-h-screen">
  <div id="app">
    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-gradient-to-r from-slate-950 to-slate-900 border-b border-slate-700 backdrop-blur-md bg-opacity-90">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <div class="flex items-center gap-3">
            <div class="flex items-center justify-center w-10 h-10 bg-gradient-to-br from-yellow-400 to-yellow-500 rounded-lg">
              <i class="fas fa-lighthouse text-slate-900 text-lg"></i>
            </div>
            <h1 class="text-xl font-bold bg-gradient-to-r from-yellow-400 to-yellow-500 bg-clip-text text-transparent">
              Cyber-Lighthouse
            </h1>
          </div>
          <div class="flex items-center gap-2">
            <button onclick="currentTab='alerts'" class="px-4 py-2 rounded-lg text-slate-300 hover:bg-slate-700/50">
              <i class="fas fa-bell"></i> Alerts
            </button>
            <button onclick="currentTab='reports'" class="px-4 py-2 rounded-lg text-slate-300 hover:bg-slate-700/50">
              <i class="fas fa-file-alt"></i> Reports
            </button>
            <button onclick="currentTab='stats'" class="px-4 py-2 rounded-lg text-slate-300 hover:bg-slate-700/50">
              <i class="fas fa-chart-bar"></i> Stats
            </button>
            <button onclick="refreshData()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg">
              <i class="fas fa-sync-alt"></i> Refresh
            </button>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div id="loading" class="flex items-center justify-center min-h-96">
        <div class="text-center">
          <i class="fas fa-spinner animate-spin text-5xl text-blue-400 mb-4"></i>
          <p class="text-slate-300 text-xl">Loading Dashboard...</p>
          <p class="text-slate-500 text-sm mt-2">Fetching data from server</p>
        </div>
      </div>

      <div id="content" style="display: none;">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
          <!-- Sidebar -->
          <div class="space-y-6">
            <div class="bg-gradient-to-br from-slate-800 to-slate-900 rounded-xl border border-slate-700 shadow-lg p-6">
              <h3 class="text-lg font-bold text-white mb-4">System Status</h3>
              <div id="system-status" class="space-y-2 text-sm">
                <p class="text-slate-400">Loading...</p>
              </div>
            </div>
            <div id="quick-stats" class="space-y-2">
              <!-- Stats will be inserted here -->
            </div>
          </div>

          <!-- Main Content Area -->
          <div class="lg:col-span-3 space-y-6">
            <!-- Alerts -->
            <div id="alerts-panel" style="display: none;" class="space-y-4">
              <h2 class="text-2xl font-bold text-white mb-4">Latest Alerts</h2>
              <div id="alerts-list" class="space-y-4">
                <p class="text-slate-400">Loading alerts...</p>
              </div>
            </div>

            <!-- Reports -->
            <div id="reports-panel" style="display: none;" class="space-y-4">
              <h2 class="text-2xl font-bold text-white mb-4">Synthesis Reports</h2>
              <div id="reports-list" class="space-y-4">
                <p class="text-slate-400">Loading reports...</p>
              </div>
            </div>

            <!-- Stats -->
            <div id="stats-panel" style="display: none;" class="space-y-6">
              <h2 class="text-2xl font-bold text-white mb-4">Statistics</h2>
              <div id="stats-content" class="space-y-4">
                <p class="text-slate-400">Loading statistics...</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentTab = 'alerts';
    let data = {
      alerts: [],
      reports: [],
      statistics: null,
      systemStatus: null
    };

    async function fetchData() {
      try {
        const [alerts, reports, stats, system] = await Promise.all([
          fetch('/api/alerts?limit=20').then(r => r.json()),
          fetch('/api/reports').then(r => r.json()),
          fetch('/api/stats').then(r => r.json()),
          fetch('/api/system').then(r => r.json())
        ]);

        data.alerts = alerts.alerts || [];
        data.reports = reports.reports || [];
        data.statistics = stats;
        data.systemStatus = system;

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';

        renderAll();
      } catch (error) {
        console.error('Error fetching data:', error);
        document.getElementById('loading').innerHTML = '<div class="text-center"><p class="text-red-400">Error loading dashboard</p><p class="text-slate-500 text-sm mt-2">' + error.message + '</p></div>';
      }
    }

    function renderAll() {
      renderSystemStatus();
      renderQuickStats();
      renderAlerts();
      renderReports();
      renderStats();
      switchTab('alerts');
    }

    function renderSystemStatus() {
      const sys = data.systemStatus;
      if (!sys) return;

      const html = `
        <div class="flex justify-between">
          <span class="text-slate-400">Database:</span>
          <span class="text-emerald-300">${sys.database_size_mb.toFixed(2)} MB</span>
        </div>
        <div class="flex justify-between">
          <span class="text-slate-400">Cache:</span>
          <span class="text-cyan-300">${sys.cache.total_entries} entries</span>
        </div>
        <div class="flex justify-between">
          <span class="text-slate-400">API Quota:</span>
          <span class="text-blue-300">${sys.api_quota_remaining}/${sys.api_quota_total}</span>
        </div>
      `;
      document.getElementById('system-status').innerHTML = html;
    }

    function renderQuickStats() {
      const stats = data.statistics;
      if (!stats) return;

      const html = `
        <div class="bg-blue-600/20 border border-blue-500/30 rounded-lg p-4">
          <p class="text-sm text-blue-300">Total</p>
          <p class="text-3xl font-bold text-white">${stats.total_articles}</p>
        </div>
        <div class="bg-yellow-600/20 border border-yellow-500/30 rounded-lg p-4">
          <p class="text-sm text-yellow-300">Today</p>
          <p class="text-3xl font-bold text-white">${stats.articles_today}</p>
        </div>
        <div class="bg-emerald-600/20 border border-emerald-500/30 rounded-lg p-4">
          <p class="text-sm text-emerald-300">Processed</p>
          <p class="text-3xl font-bold text-white">${stats.processed_articles}</p>
        </div>
      `;
      document.getElementById('quick-stats').innerHTML = html;
    }

    function renderAlerts() {
      const alerts = data.alerts;
      if (!alerts.length) {
        document.getElementById('alerts-list').innerHTML = '<p class="text-slate-400">No alerts</p>';
        return;
      }

      const html = alerts.map(alert => `
        <div class="bg-gradient-to-br from-slate-800 to-slate-900 rounded-xl border border-red-500/30 shadow-lg p-6">
          <div class="flex justify-between items-start mb-3">
            <h3 class="text-lg font-bold text-white flex-1">${alert.title}</h3>
            <span class="text-xs font-medium bg-red-500/20 text-red-300 px-3 py-1 rounded-full">${alert.source}</span>
          </div>
          ${alert.analysis ? `<div class="bg-yellow-500/10 border border-yellow-500/30 rounded-lg p-4 mb-4 text-slate-300 text-sm"><pre style="white-space: pre-wrap; font-family: inherit;">${escapeHtml(alert.analysis)}</pre></div>` : ''}
          <div class="flex justify-between items-center text-sm">
            <span class="text-slate-500">${alert.date}</span>
            <a href="${alert.link}" target="_blank" class="text-blue-400 hover:text-blue-300">Read More →</a>
          </div>
        </div>
      `).join('');
      document.getElementById('alerts-list').innerHTML = html;
    }

    function renderReports() {
      const reports = data.reports;
      if (!reports.length) {
        document.getElementById('reports-list').innerHTML = '<p class="text-slate-400">No reports</p>';
        return;
      }

      const html = reports.map(report => `
        <div class="bg-gradient-to-br from-slate-800 to-slate-900 rounded-xl border border-slate-700 shadow-lg p-6">
          <div class="flex justify-between items-center mb-4 pb-4 border-b border-slate-700">
            <h4 class="text-lg font-bold text-white">${report.generated_date}</h4>
            <span class="text-sm text-slate-400">${report.articles_count} articles</span>
          </div>
          <div class="max-h-96 overflow-y-auto text-slate-300 text-sm">
            <pre style="white-space: pre-wrap; font-family: inherit;">${escapeHtml(report.report_content)}</pre>
          </div>
        </div>
      `).join('');
      document.getElementById('reports-list').innerHTML = html;
    }

    function renderStats() {
      const stats = data.statistics;
      if (!stats) return;

      const html = `
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="bg-blue-600/20 border border-blue-500/30 rounded-xl p-6">
            <p class="text-sm text-blue-300 uppercase mb-2">Total Articles</p>
            <p class="text-4xl font-bold text-blue-300">${stats.total_articles}</p>
          </div>
          <div class="bg-emerald-600/20 border border-emerald-500/30 rounded-xl p-6">
            <p class="text-sm text-emerald-300 uppercase mb-2">Processed</p>
            <p class="text-4xl font-bold text-emerald-300">${stats.processed_articles}</p>
          </div>
          <div class="bg-yellow-600/20 border border-yellow-500/30 rounded-xl p-6">
            <p class="text-sm text-yellow-300 uppercase mb-2">Cache Hit Rate</p>
            <p class="text-4xl font-bold text-yellow-300">${stats.cache_hit_rate.toFixed(1)}%</p>
          </div>
        </div>
      `;
      document.getElementById('stats-content').innerHTML = html;
    }

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('alerts-panel').style.display = tab === 'alerts' ? 'block' : 'none';
      document.getElementById('reports-panel').style.display = tab === 'reports' ? 'block' : 'none';
      document.getElementById('stats-panel').style.display = tab === 'stats' ? 'block' : 'none';
    }

    function refreshData() {
      fetchData();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Load data on page load
    window.addEventListener('DOMContentLoaded', fetchData);
  </script>
</body>
</html>
